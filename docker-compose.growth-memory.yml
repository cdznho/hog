services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: growth_memory
      POSTGRES_USER: growth_memory
      POSTGRES_PASSWORD: growth_memory
    ports:
      - "5433:5432"
    volumes:
      - growth_memory_pg:/var/lib/postgresql/data

  api:
    build:
      context: ./growth_memory_api
    environment:
      DATABASE_URL: postgresql://growth_memory:growth_memory@db:5432/growth_memory
    depends_on:
      - db
    ports:
      - "8765:8765"

volumes:
  growth_memory_pg:
